name: CI / Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── PR / push 检查：编译 ───
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build all crates
        run: cargo build --release

  # ─── tag 触发：CLI 二进制 ───
  release-cli:
    name: CLI (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: agent-manager
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: agent-manager.exe
            ext: ".exe"
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: agent-manager
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: agent-manager
            ext: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Inject version
        shell: bash
        run: |
          python3 -c "
          import re
          v = '${{ github.ref_name }}'.lstrip('v')
          with open('cli/Cargo.toml') as f:
              c = f.read()
          c = re.sub(r'^version = .*', f'version = \"{v}\"', c, flags=re.M)
          with open('cli/Cargo.toml', 'w') as f:
              f.write(c)
          print(f'CLI version: {v}')
          "

      - name: Build CLI
        run: cargo build --release -p agent-manager --target ${{ matrix.target }}

      - name: Rename & upload
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          SRC="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          DST="agent-manager-v${V}-${{ matrix.target }}${{ matrix.ext }}"
          cp "$SRC" "$DST"
          gh release upload "$GITHUB_REF_NAME" "$DST" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── tag 触发：GUI 安装包 ───
  release-gui:
    name: GUI (${{ matrix.os }})
    needs: release-cli
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Inject version
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          python3 -c "
          import json
          with open('gui/tauri.conf.json') as f:
              cfg = json.load(f)
          cfg['version'] = '$V'
          cfg['productName'] = 'Agent Manager'
          with open('gui/tauri.conf.json', 'w') as f:
              json.dump(cfg, f, indent=2)
          print(f'App version set to $V')
          "

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Build Tauri app
        working-directory: gui
        run: tauri build --target ${{ matrix.target }}

      - name: Upload GUI artifacts
        shell: bash
        run: |
          BUNDLE="target/${{ matrix.target }}/release/bundle"
          echo "Looking for artifacts in $BUNDLE..."
          find "$BUNDLE" -type f \( \
            -name "*.dmg" -o \
            -name "*.msi" -o \
            -name "*setup*.exe" -o \
            -name "*.deb" -o \
            -name "*.AppImage" \
          \) -print0 | while IFS= read -r -d '' f; do
            echo "Uploading: $f"
            gh release upload "$GITHUB_REF_NAME" "$f" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
