name: CI / Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── PR / push 检查：编译 ───
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build all crates
        run: cargo build --release

  # ─── tag 触发：CLI 二进制 ───
  release-cli:
    name: CLI (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: agent-manager
            asset_name: agent-manager-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: agent-manager.exe
            asset_name: agent-manager-windows-amd64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: agent-manager
            asset_name: agent-manager-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: agent-manager
            asset_name: agent-manager-macos-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build CLI
        run: cargo build --release -p agent-manager --target ${{ matrix.target }}
      - name: Rename
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.artifact }} ${{ matrix.asset_name }}
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── tag 触发：GUI 安装包 ───
  release-gui:
    name: GUI (${{ matrix.os }})
    needs: release-cli
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Build Tauri app
        working-directory: gui
        run: tauri build --target ${{ matrix.target }}

      - name: Upload GUI artifacts to Release
        shell: bash
        run: |
          BUNDLE="target/${{ matrix.target }}/release/bundle"
          echo "Looking for artifacts in $BUNDLE..."
          find "$BUNDLE" -type f \( \
            -name "*.dmg" -o \
            -name "*.msi" -o \
            -name "*setup*.exe" -o \
            -name "*.deb" -o \
            -name "*.AppImage" \
          \) -print -exec gh release upload "${{ github.ref_name }}" {} --clobber \;
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
