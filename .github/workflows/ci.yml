name: CI / Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── PR / push 检查：编译 ───
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build all crates
        run: cargo build --release

  # ─── tag 触发：CLI 二进制 ───
  release-cli:
    name: CLI (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: agent-manager.exe
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Inject version
        shell: bash
        run: |
          python3 -c "
          import re
          v = '${{ github.ref_name }}'.lstrip('v')
          with open('cli/Cargo.toml') as f:
              c = f.read()
          c = re.sub(r'^version = .*', f'version = \"{v}\"', c, flags=re.M)
          with open('cli/Cargo.toml', 'w') as f:
              f.write(c)
          print(f'CLI version: {v}')
          "

      - name: Build CLI
        run: cargo build --release -p agent-manager --target ${{ matrix.target }}

      - name: Rename & upload
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          V="${TAG#v}"
          SRC="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          DST="agent-manager-v${V}-${{ matrix.target }}${{ matrix.ext }}"
          cp "$SRC" "$DST"
          # create release if not exists, then upload
          gh release view "$TAG" &>/dev/null || gh release create "$TAG" --title "$TAG" --notes ""
          gh release upload "$TAG" "$DST" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── tag 触发：GUI 安装包 ───
  release-gui:
    name: GUI (${{ matrix.os }})
    needs: release-cli
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Inject version
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          python3 -c "
          import json
          with open('gui/tauri.conf.json', 'rb') as f:
              raw = f.read()
          # strip BOM if present
          if raw[:3] == b'\xef\xbb\xbf':
              raw = raw[3:]
          cfg = json.loads(raw)
          cfg['version'] = '$V'
          with open('gui/tauri.conf.json', 'w') as f:
              json.dump(cfg, f, indent=2)
          print('App version set to $V')
          "

      - name: Build Tauri app
        working-directory: gui
        run: tauri build --target ${{ matrix.target }}

      - name: Upload GUI artifacts
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          BUNDLE="target/${{ matrix.target }}/release/bundle"
          echo "Looking for artifacts in $BUNDLE..."
          # Ensure release exists (fallback if CLI job failed)
          gh release view "$TAG" &>/dev/null || {
            echo "Creating release $TAG..."
            gh release create "$TAG" --title "$TAG" --notes ""
          }
          # Upload all found installers
          find "$BUNDLE" -type f \( \
            -name "*.dmg" -o \
            -name "*.msi" -o \
            -name "*setup*.exe" -o \
            -name "*.deb" -o \
            -name "*.AppImage" \
          \) | while read f; do
            echo "Uploading: $f"
            gh release upload "$TAG" "$f" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── 生成更新清单 latest.json ───
  release-update-manifest:
    name: Update manifest
    needs: release-gui
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate latest.json
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"
          echo "{\"version\":\"$VERSION\",\"notes\":\"Release $TAG\",\"pub_date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"platforms\":{}}" > latest.json
          echo "Generated latest.json"
          cat latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload latest.json
        run: gh release upload "${{ github.ref_name }}" latest.json --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
