<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <nav id="sidebar">
      <div class="logo">🤖 Agent Manager</div>
      <button class="nav-btn active" data-page="agents">📡 Agents</button>
      <button class="nav-btn" data-page="profiles">⚙️ Profiles</button>
      <button class="nav-btn" data-page="skills">📚 Skills</button>
      <button class="nav-btn" data-page="settings">🔧 设置</button>
      <div class="sidebar-footer">
        <span id="version-label"></span>
        <button class="btn-sm err-log-btn" onclick="openErrorLog()" id="err-indicator" style="display:none">⚠️ 错误日志</button>
      </div>
    </nav>
    <main id="content"></main>
  </div>
  <script src="app.js"></script>
</body>
</html>
